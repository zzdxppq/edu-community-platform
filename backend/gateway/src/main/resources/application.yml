spring:
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: 6379
      database: 0
      timeout: 3000ms
  cloud:
    gateway:
      routes:
        - id: core-service
          uri: lb://core-service
          predicates:
            - Path=/api/core/**
          filters:
            - StripPrefix=2
        - id: content-service
          uri: lb://content-service
          predicates:
            - Path=/api/content/**
          filters:
            - StripPrefix=2
        - id: file-service
          uri: lb://file-service
          predicates:
            - Path=/api/file/**
          filters:
            - StripPrefix=2

jwt:
  secret: ${JWT_SECRET:edu-community-platform-jwt-secret-key-at-least-32-chars}

auth:
  whitelist:
    - /api/core/v1/auth/login
    - /api/core/v1/auth/refresh
    - /api/content/v1/portal/**
    - /actuator/**

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
