epic_id: 9
title: 资源共享模块
description: >
  实现资源共享全流程：后台发布管理（含分类、置顶），
  前端分类浏览、搜索筛选、在线预览与下载
target_platform: fullstack
stories:

  - story_id: "9.1"
    title: 资源共享数据模型与后端 API
    description: >
      实现资源共享表 CRUD API（参见 7.1.6），支持分类（省外经验/省内经验/研究文献）、
      状态筛选、置顶、文件上传与管理
    acceptance_criteria:
      - CRUD 接口完整
      - 支持按分类（省外经验/省内经验/研究文献）筛选
      - 资源描述字段使用富文本
      - 支持文件上传（PDF/Word/Excel，≤50MB）
      - 超级管理员可删除全站所有资源
      - 学校管理员仅可删除本校资源
      - 置顶排序逻辑正确
    estimated_complexity: S
    priority: 高

  - story_id: "9.2"
    title: 资源共享后台管理页面
    description: >
      超级管理员发布/编辑/删除资源；支持分类选择、状态筛选、
      置顶设置、三种发布方式；可删除全站资源
    acceptance_criteria:
      - 列表分页展示（标题/分类/来源/文件大小/状态/置顶/发布时间）
      - 支持按分类和发布状态联合筛选
      - 资源描述使用统一富文本编辑器
      - 使用统一内容发布组件（三种模式）
      - 删除操作保留删除记录
    estimated_complexity: M
    priority: 高

  - story_id: "9.3"
    title: 资源共享前端展示
    description: >
      前端资源共享页面：左侧分类导航、右侧资源列表（含分类标签/来源/文件大小），
      模块内搜索、二级分类筛选、在线预览与下载
    acceptance_criteria:
      - 左侧分类导航栏（省外经验/省内经验/研究文献）
      - 列表显示标题、发布时间、文件大小、所属二级分类、来源
      - 按时间倒序、置顶优先、支持分页
      - 支持关键词搜索（模块内）
      - 支持按二级分类下拉筛选
      - 在线预览功能正常（PDF/文档）
      - 文件下载功能正常
      - 搜索无结果时显示友好提示
    estimated_complexity: L
    priority: 中
