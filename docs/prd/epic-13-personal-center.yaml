epic_id: 13
title: 个人中心模块
phase: P1
description: >
  实现普通用户个人中心：个人信息管理、浏览历史记录、
  收藏管理功能
target_platform: frontend
dependencies:
  - Epic 12 普通用户体系

stories:

  - story_id: "13.1"
    title: 个人信息管理页面
    description: >
      普通用户个人中心首页：展示个人信息（昵称、手机号/邮箱、身份标签），
      支持修改昵称、头像、联系方式（需验证码校验）
    acceptance_criteria:
      - 展示用户昵称、手机号/邮箱（部分脱敏）、身份标签、注册时间
      - 身份标签仅展示，无修改入口
      - 修改手机号/邮箱需通过原手机号/邮箱验证码验证
      - 支持上传/更换头像
      - 支持修改昵称
      - 修改密码功能（需验证原密码）
    estimated_complexity: M
    priority: 高

  - story_id: "13.2"
    title: 浏览历史功能
    description: >
      记录用户近3个月内浏览的政策文件、资源材料、校共体信息等，
      支持快速回访和历史清理
    acceptance_criteria:
      - 自动记录用户浏览的政策文件、新闻资讯、资源共享、校共体介绍/活动/月报
      - 浏览历史按时间倒序，按日期分组展示
      - 每条记录显示标题、所属模块图标、浏览时间
      - 点击可跳转到原始详情页
      - 支持删除单条记录
      - 支持一键清空全部历史
      - 仅保留近3个月数据，定时任务自动清理过期记录
    estimated_complexity: M
    priority: 中

  - story_id: "13.3"
    title: 收藏管理功能
    description: >
      用户可收藏政策文件、资源、新闻等内容，收藏永久保存，
      支持在各详情页添加/取消收藏，个人中心统一管理
    acceptance_criteria:
      - 政策文件、新闻资讯、资源共享、校共同体活动详情页提供收藏按钮
      - 已收藏内容显示"已收藏"状态，可点击取消
      - 个人中心收藏列表按收藏时间倒序排列
      - 支持按内容类型筛选（全部/政策/新闻/资源/活动）
      - 支持批量取消收藏（多选+确认）
      - 收藏内容永久保存（原文被删除时标记"原文已删除"）
      - 收藏数据为个人中心数据，不影响前端公开展示
    estimated_complexity: M
    priority: 中
