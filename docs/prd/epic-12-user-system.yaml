epic_id: 12
title: 普通用户体系
phase: P1
description: >
  实现普通用户注册登录功能，支持手机号/邮箱注册、身份标签选择、
  密码找回，以及超管对普通用户的管理和智能体权限管控
target_platform: fullstack
dependencies:
  - 一期功能稳定运行（Epic 1-11）
  - 短信/邮件验证码服务就绪

stories:

  - story_id: "12.1"
    title: 普通用户数据模型与注册 API
    description: >
      实现普通用户表（参见 7.3.1）CRUD API，包含手机号/邮箱唯一校验、
      BCrypt 密码加密、身份标签绑定（不可修改）
    acceptance_criteria:
      - 注册 API 支持手机号或邮箱注册，至少填一项
      - 注册时必须选择唯一身份标签（7种），写入后不可修改
      - 手机号/邮箱唯一校验，重复注册返回明确错误
      - 密码 BCrypt 加密存储，复杂度校验（8-20位字母+数字）
      - 注册需验证码校验（短信或邮件）
      - 注册成功后自动签发 Token 并登录
    estimated_complexity: M
    priority: 高

  - story_id: "12.2"
    title: 用户注册页面与身份标签选择
    description: >
      前端注册页面：手机号/邮箱输入、验证码获取、密码设置、
      身份标签选择（单选卡片式，7种身份可视化展示+描述说明）
    acceptance_criteria:
      - 注册表单包含手机号/邮箱切换、验证码、密码、确认密码
      - 身份标签以可视化卡片形式展示，每种身份附简要描述
      - 身份标签为必选项，提交前需确认"身份提交后不可修改"
      - 验证码倒计时60秒，5分钟有效
      - 注册成功后跳转来源页或首页
      - 一期期间注册入口隐藏，智能体上线后开放
    estimated_complexity: M
    priority: 高

  - story_id: "12.3"
    title: 用户登录与密码找回
    description: >
      前端登录页面：支持手机号/邮箱+密码或验证码登录；
      密码找回页面：通过已绑定手机号/邮箱验证码重置密码
    acceptance_criteria:
      - 登录支持手机号/邮箱+密码登录
      - 登录支持手机号/邮箱+验证码快捷登录
      - 登录失败显示明确错误（账号不存在/密码错误/账号已禁用）
      - 密码找回流程：输入手机号/邮箱 → 发送验证码 → 验证 → 设置新密码
      - 新密码需满足复杂度要求
      - 官网前端默认显示普通用户登录，下方设管理员登录入口
    estimated_complexity: M
    priority: 高

  - story_id: "12.4"
    title: 前端登录状态管理与路由守卫
    description: >
      普通用户 Token 管理、登录状态持久化、
      智能体相关页面路由守卫（未登录重定向到登录页）
    acceptance_criteria:
      - 普通用户 Token 与管理员 Token 体系独立
      - 登录状态支持页面刷新后保持
      - 智能体、个人中心页面需登录后访问（路由守卫拦截）
      - 未登录访问受保护页面时弹出登录引导
      - 登录后自动跳转到原目标页面
      - Token 过期时自动跳转登录页
    estimated_complexity: S
    priority: 中

  - story_id: "12.5"
    title: 超管普通用户管理
    description: >
      超级管理员在后台查看所有注册普通用户，支持按身份标签、
      手机号、注册时间筛选，可导出用户基础数据
    acceptance_criteria:
      - 用户列表分页展示：手机号/邮箱、昵称、身份标签、注册时间、状态、最后登录
      - 支持按身份标签下拉筛选
      - 支持按手机号/邮箱模糊搜索
      - 支持按注册时间范围筛选
      - 支持导出用户列表（Excel，不含密码）
      - 显示用户总数和各身份分布统计
    estimated_complexity: M
    priority: 中

  - story_id: "12.6"
    title: 普通用户账号管控与智能体权限
    description: >
      超级管理员禁用/启用普通用户账号，管控智能体使用权限
      （授予/回收），查看用户智能体使用量
    acceptance_criteria:
      - 禁用后用户无法登录，已登录 Token 立即失效
      - 启用后账号恢复正常
      - 可单独授予/回收用户智能体使用权限
      - 可调整用户每日智能体使用额度
      - 显示用户智能体使用量（本日/本月问答次数）
      - 操作需二次确认弹框
    estimated_complexity: M
    priority: 低
