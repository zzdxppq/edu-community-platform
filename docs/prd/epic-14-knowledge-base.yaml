epic_id: 14
title: 知识库建设
phase: P1
description: >
  建设平台知识库体系：自动采集平台已发布内容、支持手动录入 FAQ 和专家问答、
  知识分类与标签管理、向量化索引、知识审核发布，
  为智能体（Epic 15）提供知识检索基础
target_platform: fullstack
dependencies:
  - 一期内容数据就绪（政策文件、新闻、资源、校共体信息已有数据）
  - 向量数据库部署完成
  - 通义千问 Embedding API 接入就绪
technical_notes: >
  大模型选型：通义千问（阿里云）。
  RAG 架构：平台内容 → 文本提取 → 分块 → 通义千问 Embedding 向量化 → 向量数据库存储 → 语义检索。
  向量数据库选型由架构师在 Story Review 阶段确定。

stories:

  - story_id: "14.1"
    title: 知识库数据模型与基础架构
    description: >
      实现知识条目表（7.3.4）、知识分类表（7.3.5）、FAQ 表（7.3.6）、
      专家问答表（7.3.7）的数据模型，搭建知识库微服务基础框架
    acceptance_criteria:
      - 四张核心表创建完成，Flyway 迁移脚本就绪
      - 知识条目 CRUD API 完整
      - 知识分类 CRUD API（支持两级结构）
      - 预置知识分类：政策法规、教学资源、校共体经验、常见问题、专家解答
      - 知识库服务独立模块（knowledge-service 或 content-service 扩展）
      - API 接口鉴权（仅管理员可写入，已授权用户可检索）
    estimated_complexity: M
    priority: 高

  - story_id: "14.2"
    title: 平台内容自动采集与向量化
    description: >
      将平台已发布的政策文件、新闻资讯、校共体信息、资源共享内容
      自动采集入知识库，提取纯文本后分块向量化存储；
      内容发布/更新/删除时自动同步
    acceptance_criteria:
      - 全量采集：一键将全部已发布内容导入知识库
      - 增量同步：内容发布时自动创建知识条目，更新时重新向量化，删除时标记下架
      - 文本提取：从富文本 HTML 中提取纯文本，去除标签和格式
      - 分块策略：长文本按段落/语义分块（每块≤512 tokens），保留标题和来源信息
      - 向量化：调用通义千问 Embedding API 生成向量，存入向量数据库
      - 采集状态可在后台查看（总量/已向量化/待处理/失败）
      - 向量化失败时自动重试（最多3次），失败记录可查看
      - 同步延迟≤30分钟
    estimated_complexity: L
    priority: 高

  - story_id: "14.3"
    title: FAQ 手动录入与管理
    description: >
      超级管理员在后台手动录入常见问题与标准答案，
      支持单条录入和批量导入（Excel），FAQ 自动同步到知识库并向量化
    acceptance_criteria:
      - FAQ 录入表单：问题（必填）+ 答案（富文本）+ 所属分类 + 排序
      - FAQ 列表分页展示，支持按分类筛选和关键词搜索
      - 支持编辑、删除、调整排序
      - 支持 Excel 批量导入（模板：问题/答案/分类，提供下载模板）
      - 导入时校验必填项，错误行提示具体原因
      - FAQ 录入后自动创建知识条目并向量化
      - 展示查看次数和"有帮助"计数（用户反馈）
    estimated_complexity: M
    priority: 高

  - story_id: "14.4"
    title: 专家问答录入与管理
    description: >
      超级管理员录入专家问答（问题+专家信息+回答），
      支持富文本编辑回答内容，自动同步到知识库
    acceptance_criteria:
      - 录入表单：问题（必填）+ 专家姓名（必填）+ 专家职称 + 专家机构 + 回答（富文本）+ 所属分类
      - 问答列表分页展示，支持按分类/专家名称筛选
      - 支持编辑、删除
      - 录入后自动创建知识条目并向量化
      - 前端智能问答引用专家回答时展示专家信息
    estimated_complexity: M
    priority: 中

  - story_id: "14.5"
    title: 知识分类与标签管理
    description: >
      超级管理员管理知识库分类体系（两级结构）和标签体系，
      支持为知识条目批量打标签
    acceptance_criteria:
      - 分类管理：两级分类结构，支持 CRUD 和排序
      - 预置分类不可删除仅可编辑名称
      - 标签管理：支持自由添加、删除标签
      - 知识条目支持多标签
      - 支持按分类/标签筛选知识条目
      - 支持批量为知识条目添加/移除标签
      - 分类/标签使用统计（各分类/标签下的知识数量）
    estimated_complexity: M
    priority: 中

  - story_id: "14.6"
    title: 知识审核发布与统计仪表盘
    description: >
      手动录入的知识条目需审核后发布；知识库统计仪表盘展示
      总量、分类分布、采集同步状态、最近更新记录
    acceptance_criteria:
      - 手动录入的 FAQ/专家问答默认"待审核"，需审核通过后发布
      - 自动采集的内容默认"已通过"（因原内容已在平台发布）
      - 审核操作：通过/拒绝（需填写拒绝原因）
      - 支持批量审核
      - 审核记录可追溯（审核人、时间、操作）
      - 知识库统计仪表盘：总知识条目数、各分类数量占比饼图、自动采集/手动录入占比、已向量化/待处理数量、最近7天新增趋势、最近更新记录列表
    estimated_complexity: M
    priority: 低
