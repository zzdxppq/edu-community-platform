epic_id: 4
title: 内容管理基础
description: >
  完成栏目管理、富文本编辑器集成、轮播图管理、
  内容发布三模式框架及前端动态导航
target_platform: fullstack
stories:

  - story_id: "4.1"
    title: 一级栏目管理
    description: >
      超级管理员管理前端一级栏目：新增/编辑/删除/排序/隐藏；
      系统预置栏目不可删除仅可隐藏
    acceptance_criteria:
      - 栏目列表展示名称、代码、状态、排序、是否系统预置
      - 支持拖拽或数字调整排序
      - 系统预置栏目（首页/项目介绍/政策文件/示范校共体/资源共享/登录）仅可隐藏不可删除
      - 栏目下有关联内容时不可删除仅可隐藏
      - 编辑后前端导航实时更新
    estimated_complexity: M
    priority: 高

  - story_id: "4.2"
    title: 二级栏目管理
    description: >
      超级管理员设置一级栏目是否启用二级菜单；新增/编辑/删除/排序
      二级菜单项；二级菜单关联对应内容分类
    acceptance_criteria:
      - 开关控制一级栏目是否启用二级菜单
      - 二级菜单支持 CRUD 和排序
      - 预置二级菜单：政策文件（国家政策/省级政策）、资源共享（省外经验/省内经验/研究文献）
      - 示范校共体的二级内容通过 Tab 切换实现，不在此管理
      - 二级菜单关联内容分类用于前端筛选
    estimated_complexity: M
    priority: 高

  - story_id: "4.3"
    title: 富文本编辑器集成与统一配置
    description: >
      选型并集成全站统一富文本编辑器，配置完整功能（格式/字体/段落/
      列表/图片/视频/表格/链接/首行缩进/行间距等）
    acceptance_criteria:
      - 支持基础格式（加粗/斜体/下划线/删除线）
      - 支持字体选择（宋体/黑体/楷体/微软雅黑等）、字号（12-48px）、字体颜色、背景色
      - 支持段落格式（对齐方式/首行缩进2字符/行间距/段落间距）
      - 支持列表（有序/无序）、表格、分割线
      - 支持图片上传（≤5MB，jpg/png/gif）、视频上传/嵌入、链接
      - 支持撤销/重做、全屏编辑、源码模式
      - 编辑器作为全局组件，所有内容发布页面统一使用
    estimated_complexity: L
    priority: 高

  - story_id: "4.4"
    title: 轮播图管理
    description: >
      超级管理员管理首页轮播图：新增/编辑/删除/排序，
      设置图片、跳转链接、显示状态
    acceptance_criteria:
      - 轮播图列表展示缩略图、标题、跳转链接、状态、排序
      - 支持图片上传（建议尺寸提示）
      - 支持设置跳转链接和显示/隐藏状态
      - 支持拖拽排序
      - 前端首页轮播图据此数据渲染
    estimated_complexity: M
    priority: 中

  - story_id: "4.5"
    title: 内容发布三模式框架
    description: >
      开发可复用的内容发布组件，支持三种发布方式：①图文编辑（富文本）
      ②附件上传（PDF/Word，可选）③外部链接（仅标题+URL）
    acceptance_criteria:
      - 发布表单提供发布方式切换（图文编辑/附件上传/外部链接）
      - 图文编辑模式调用统一富文本编辑器
      - 附件上传支持 PDF/Word/Excel，单文件≤50MB
      - 外部链接模式仅需填写标题和URL（封面图/摘要可选）
      - 外部链接仅支持 http/https 协议
      - 组件可被新闻/政策/资源/活动等模块复用
    estimated_complexity: L
    priority: 高

  - story_id: "4.6"
    title: 前端动态导航渲染
    description: >
      前端根据后台栏目配置 API 动态生成导航栏，
      包括一级栏目和二级下拉菜单
    acceptance_criteria:
      - 导航栏数据从栏目配置 API 获取（非硬编码）
      - 隐藏状态的栏目不在导航栏显示
      - 二级菜单按配置的排序展示
      - 栏目配置变更后前端导航自动更新（无需重新部署）
      - API 响应缓存以保证加载性能
    estimated_complexity: M
    priority: 中
