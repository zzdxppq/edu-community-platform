epic_id: 15
title: 智能体核心功能
phase: P1
description: >
  基于知识库（Epic 14）和通义千问大模型，实现智能问答（RAG 对话）、
  个性化内容推荐、数据可视化分析报告、个性化提醒四大核心功能，
  以及智能体使用权限控制与后台运营管理
target_platform: fullstack
dependencies:
  - Epic 12 普通用户体系（注册登录、身份标签）
  - Epic 14 知识库建设（知识检索服务就绪）
  - 通义千问 Chat API 接入就绪
technical_notes: >
  大模型：通义千问（阿里云）。
  智能问答采用 RAG 模式：用户提问 → 向量检索知识库 → 召回相关知识片段 →
  组装 Prompt（系统指令+知识上下文+用户问题）→ 调用通义千问生成回答。
  推荐引擎：基于身份标签的规则推荐 + 基于浏览行为的协同推荐。

stories:

  - story_id: "15.1"
    title: 智能问答（RAG 对话）
    description: >
      实现基于知识库的智能问答功能：用户输入问题，系统检索知识库
      召回相关内容，通过通义千问生成回答并标注知识来源；
      支持多轮对话和会话管理
    acceptance_criteria:
      - 前端对话界面：输入框+对话气泡+发送按钮，支持 Enter 发送
      - 流式输出：回答逐字显示（SSE/WebSocket），提升体验
      - 回答末尾标注引用来源（知识条目标题，可点击跳转原文）
      - 支持多轮对话（上下文保留最近10轮）
      - 会话列表：用户可查看历史会话，点击继续对话
      - 新建会话按钮，清空上下文开始新对话
      - 无法回答时友好提示"抱歉，暂未找到相关信息，建议您..."
      - 单次响应时间≤10秒
      - 仅已登录且已授权用户可使用
      - 每次问答消耗1次额度，额度用完时提示
      - 对话记录写入智能体对话记录表（7.3.8）
      - 用户可对每条回答进行满意度评价（有帮助/没帮助）
    estimated_complexity: XL
    priority: 高

  - story_id: "15.2"
    title: 个性化内容推荐
    description: >
      基于用户身份标签和浏览行为，在首页、详情页侧边栏、
      个人中心推荐相关内容
    acceptance_criteria:
      - 推荐规则：身份标签权重60% + 浏览行为权重40%
      - 身份推荐映射：教师→教学资源/活动；教研员→研究文献/政策；家长→校共体成果/新闻；教育研究者→研究文献/数据报告；县级行政→政策文件/数据报告
      - 首页推荐区域：登录后在首页模块入口下方展示"为你推荐"区块（≥5条）
      - 详情页推荐：文章/资源详情页右侧或底部展示"相关推荐"（≥3条）
      - 个人中心推荐：推荐Tab展示个性化推荐列表
      - 支持"不感兴趣"反馈，反馈后不再推荐同类内容
      - 未登录用户不展示推荐区域
      - 新注册用户无浏览数据时，按身份标签默认推荐
      - 推荐列表每日更新
    estimated_complexity: L
    priority: 中

  - story_id: "15.3"
    title: 数据可视化分析报告
    description: >
      为县级教育行政部门工作人员、教育研究者自动生成
      校共体建设数据分析报告，包含交互式图表和 PDF 导出
    acceptance_criteria:
      - 仅特定身份用户可使用：县级教育行政部门工作人员、教育研究者
      - 报告维度：校共体活动频次趋势（折线图）、资源分布统计（柱状图）、区域对比（地图/表格）、月报提交率（饼图）、示范校建设进度对比
      - 支持选择时间范围（近1月/3月/6月/1年/自定义）
      - 支持选择区域范围（全省/指定市/指定县）
      - 图表支持交互式操作（悬停显示数值、点击下钻）
      - 报告可导出为 PDF（含图表和数据摘要）
      - 数据基于平台真实内容统计（活动表、月报表、资源表等）
      - 报告生成时间≤15秒
    estimated_complexity: L
    priority: 中

  - story_id: "15.4"
    title: 个性化提醒与消息中心
    description: >
      当用户收藏的内容更新、关注领域有新政策发布时推送提醒；
      站内消息中心展示所有提醒
    acceptance_criteria:
      - 提醒类型：收藏内容更新、关注领域新政策、系统公告
      - 站内消息中心：导航栏显示未读消息数角标
      - 消息列表按时间倒序，区分已读/未读
      - 点击消息可跳转到原文详情页
      - 支持一键全部已读
      - 支持设置提醒偏好（个人中心设置开启/关闭各类提醒）
      - 提醒触发逻辑：内容发布/更新时异步检查收藏用户，批量创建消息
      - 可选邮件推送（用户在设置中开启时发送邮件通知）
    estimated_complexity: M
    priority: 低

  - story_id: "15.5"
    title: 智能体使用权限与后台运营管理
    description: >
      实现智能体授权模式管理（邀请码/收费/免费试用）、邀请码管理、
      使用统计仪表盘、对话记录管理
    acceptance_criteria:
      - 授权模式配置：超管可在后台切换授权模式（邀请码制/收费/免费试用）
      - 邀请码管理：批量生成（指定数量+有效期+使用次数），列表展示使用状态，支持导出
      - 未授权用户看到智能体入口但无法使用，显示"获取使用权限"引导
      - 使用额度：超管可全局配置每日默认额度，也可为单个用户调整
      - 使用统计仪表盘：日活用户数趋势、问答总次数、平均满意度评分、各身份用户分布、Token 消耗量（成本监控）
      - 对话记录管理：超管可按用户/时间/关键词搜索对话记录，标记低质量回答
      - 统计数据支持导出（Excel/PDF）
      - 配置变更即时生效
    estimated_complexity: L
    priority: 中
