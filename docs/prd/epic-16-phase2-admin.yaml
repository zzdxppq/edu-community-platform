epic_id: 16
title: 后台二期扩展
phase: P1
description: >
  完成二期后台扩展功能：内容统计报表导出、操作日志管理、
  学校管理端内容查询和本地资源管理
target_platform: fullstack
dependencies:
  - 一期功能稳定运行（Epic 1-11）

stories:

  - story_id: "16.1"
    title: 内容统计报表与导出
    description: >
      超级管理员查看全平台内容发布统计：各栏目内容数量、
      学校管理员发布频次、趋势图表，支持导出 Excel/PDF
    acceptance_criteria:
      - 统计维度：各栏目内容数量（柱状图）、各栏目占比（饼图）、学校管理员发布频次排名、按月发布趋势（折线图）
      - 支持按时间段筛选（近1月/3月/6月/1年/自定义）
      - 学校管理员报表可单独查看（按学校分组的活动数/月报数）
      - 导出为 Excel（数据表格）或 PDF（含图表和摘要）
      - 学校管理员登录后可导出本校数据报表
    estimated_complexity: M
    priority: 中

  - story_id: "16.2"
    title: 操作日志管理
    description: >
      完善操作日志记录（参见 7.1.11）并实现后台日志查看页面，
      支持多维筛选和导出
    acceptance_criteria:
      - 记录所有管理员操作：登录/登出、内容发布/编辑/删除、权限调整、越权登录、系统配置变更
      - 日志列表分页展示：操作人、操作类型、操作对象、操作时间、IP地址
      - 支持按操作人、操作类型、时间范围筛选
      - 支持关键词搜索（操作对象名称、操作详情）
      - 日志不可删除（仅查看和导出）
      - 支持导出日志（Excel，按筛选条件导出）
      - 越权登录操作高亮显示
    estimated_complexity: M
    priority: 中

  - story_id: "16.3"
    title: 学校管理端内容查询
    description: >
      学校管理员按内容类型、发布时间、标题筛选
      本人发布的所有内容，快速定位修改或删除
    acceptance_criteria:
      - 统一内容查询页面，展示本人发布的全部内容（活动/月报/介绍）
      - 支持按内容类型下拉筛选
      - 支持按发布时间范围筛选
      - 支持按标题关键词搜索
      - 列表显示标题、类型、发布时间、状态
      - 点击可跳转到编辑页面
      - 支持直接删除（二次确认）
    estimated_complexity: S
    priority: 低

  - story_id: "16.4"
    title: 学校管理端本地资源管理
    description: >
      学校管理员查看本人上传的所有资源（图片/附件/视频），
      支持分类筛选、下载、删除本校资源
    acceptance_criteria:
      - 资源列表展示文件名、文件类型图标、文件大小、上传时间、关联内容
      - 支持按文件类型筛选（图片/文档/视频/全部）
      - 支持下载资源文件
      - 支持删除本校资源（二次确认，已关联内容中的引用会失效并提示）
      - 仅展示本校上传的资源（数据隔离）
      - 显示存储空间使用量统计
    estimated_complexity: M
    priority: 低
